services:
  superset-db:
    image: postgres:13-alpine
    container_name: superset-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
      POSTGRES_DB: superset
    volumes:
      - superset-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - superset-network

  superset-redis:
    image: redis:7-alpine
    container_name: superset-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - superset-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - superset-network

  superset:
    build: .
    container_name: superset-app
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      - DATABASE_URL=postgresql://superset:superset@superset-db:5432/superset
      - REDIS_URL=redis://superset-redis:6379/0
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
    volumes:
      - superset-home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py
    depends_on:
      superset-db:
        condition: service_healthy
      superset-redis:
        condition: service_healthy
    networks:
      - superset-network

  superset-worker:
    build: .
    container_name: superset-worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://superset:superset@superset-db:5432/superset
      - REDIS_URL=redis://superset-redis:6379/0
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY}
      - SQLALCHEMY_DATABASE_URI=postgresql://superset:superset@superset-db:5432/superset
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - DISPLAY=:99
      - PYTHONUNBUFFERED=1
    volumes:
      - superset-home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py
    command: >
      sh -c "
      Xvfb :99 -screen 0 1920x1080x24 &
      export DISPLAY=:99 &&
      celery --app=superset.tasks.celery_app:app worker
      --pool=prefork
      -O fair
      -c 4
      --loglevel=info
      "
    depends_on:
      superset-db:
        condition: service_healthy
      superset-redis:
        condition: service_healthy
    networks:
      - superset-network

  superset-beat:
    build: .
    container_name: superset-beat
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://superset:superset@superset-db:5432/superset
      - REDIS_URL=redis://superset-redis:6379/0
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY}
      - SQLALCHEMY_DATABASE_URI=postgresql://superset:superset@superset-db:5432/superset
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
    volumes:
      - superset-home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py
    command: >
      sh -c "rm -f /tmp/celerybeat.pid &&
      celery --app=superset.tasks.celery_app:app beat
      --pidfile=/tmp/celerybeat.pid
      --schedule=/tmp/celerybeat-schedule
      --loglevel=info"
    depends_on:
      superset-db:
        condition: service_healthy
      superset-redis:
        condition: service_healthy
    networks:
      - superset-network

networks:
  superset-network:
    driver: bridge

volumes:
  superset-db-data:
  superset-redis-data:
  superset-home: